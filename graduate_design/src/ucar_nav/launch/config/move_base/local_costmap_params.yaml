# Description:
#  本地代价地图需要配置的参数，各参数意义如下:
#  global_frame:在本地代价地图中的全局坐标系;
#  robot_base_frame:机器人本体的基坐标系;

local_costmap:
  # 坐标系设置
  global_frame: map              # 全局坐标系，通常为map或odom
  robot_base_frame: base_link    # 机器人基坐标系
  
  # 更新频率
  update_frequency: 5.0          # 代价地图更新频率(Hz)，增大提高实时性但增加计算负载
  publish_frequency: 1.2         # 发布频率(Hz)，用于可视化
  
  # 地图类型
  static_map: false              # 是否使用静态地图，本地代价地图通常设为false
  rolling_window: true           # 是否使用滚动窗口，使代价地图随机器人移动
  
  # 地图尺寸和分辨率
  width: 4.0                     # 代价地图宽度(m)，影响规划视野
  height: 4.0                    # 代价地图高度(m)
  resolution: 0.05               # 分辨率(m/cell)，值越小精度越高但计算量越大
  
  # 坐标变换
  transform_tolerance: 10        # 坐标变换容忍时间(s)，确保TF数据有效性
  
  # 图层配置
  plugins:
#    - {name: static_layer,    type: "costmap_2d::StaticLayer"}  # 静态图层，注释掉不使用
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}  # 障碍物图层，检测实时障碍物
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}  # 膨胀图层，在障碍物周围创建代价梯度