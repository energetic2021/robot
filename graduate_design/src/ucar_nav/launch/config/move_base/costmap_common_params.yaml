#Description:
# 代价地图通用参数配置文件,就是全局代价地图和局部代价地图
# 共同都需要配置的参数,各参数意义如下:

# 机器人几何参数
robot_radius: 0.25                  # 机器人半径(m)，用于碰撞检测和膨胀计算

# 替代方案：使用多边形足迹（注释状态）
# footprint: [[0.25, 0.0], [0.0, 0.25], [-0.25, 0.0], [0.0, -0.25]]

# 障碍物图层配置
obstacle_layer:
  enabled: true                      # 启用障碍物图层
  combination_method: 1              # 数据融合方法：1=覆盖，2=最大值
  track_unknown_space: true          # 跟踪未知空间，true=未知区域可通行
  
  # 障碍物检测范围
  obstacle_range: 2.0                # 障碍物检测最大范围(m)，只考虑此范围内的障碍物
  raytrace_range: 3.0                # 光线追踪范围(m)，用于清除此范围内已消失的障碍物
  
  # 传感器配置
  observation_sources: laser_scan_sensor  # 观测数据源名称
  laser_scan_sensor: {
    sensor_frame: laser,       # 传感器坐标系
    data_type: LaserScan,            # 数据类型：激光扫描
    topic: scan,                     # 传感器话题
    marking: true,                   # 是否标记新障碍物
    clearing: true,                  # 是否清除已消失的障碍物
    inf_is_valid: true               # 是否处理无穷远读数（超出量程）
  }

# 膨胀图层配置
inflation_layer:
  enabled: true                      # 启用膨胀图层
  cost_scaling_factor: 1.0           # 代价缩放因子，控制代价衰减速度
  inflation_radius: 0.15              # 膨胀半径(m)，创建安全区域

# 静态图层配置
static_layer:
  enabled: true                      # 启用静态图层（在全局代价地图中更重要）