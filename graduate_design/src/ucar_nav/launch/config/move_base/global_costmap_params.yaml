#Description:
#  全局代价地图参数配置文件,各参数的意义如下：
#  global_frame:在全局代价地图中的全局坐标系;
#  robot_base_frame:机器人的基坐标系;

global_costmap:
  # 坐标系设置
  global_frame: map              # 全局坐标系，固定为map
  robot_base_frame: base_link    # 机器人基坐标系
  
  # 更新频率
  update_frequency: 0.5          # 更新频率(Hz)，全局地图更新较慢以节省计算资源
  publish_frequency: 0.5         # 发布频率(Hz)，用于可视化
  
  # 地图类型（关键区别）
  static_map: true               # 使用静态地图，从map_server加载
  rolling_window: false          # 不使用滚动窗口，全局地图固定
  
  # 坐标变换
  transform_tolerance: 10        # 坐标变换容忍时间(s)
  
  # 未知空间处理
  track_unknown_space: true      # 是否跟踪未知空间，true表示将未知区域视为可通行
  
  # 图层配置
  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}    # 静态图层，加载预定义地图
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}  # 障碍物图层，检测动态障碍物
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"} # 膨胀图层，创建障碍物安全区域