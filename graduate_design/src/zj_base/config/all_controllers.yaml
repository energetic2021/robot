# all_controllers.yaml

# 1. 基础控制器 - 必须首先启动
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

# 2. 底盘驱动控制器
mobile_base_controller:
  type: "diff_drive_controller/DiffDriveController"
  left_wheel: 'left_wheel2base_link'
  right_wheel: 'right_wheel2base_link'
  wheel_separation: 0.5
  wheel_radius: 0.075
  pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.03]
  twist_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.03]
  base_frame_id: base_footprint
  odom_frame_id: odom
  # cmd_vel_topic: cmd_vel              # 改为标准话题
  enable_odom_tf: true
  publish_rate: 50
  cmd_vel_timeout: 0.5
  linear:
    x:
      has_velocity_limits: true
      max_velocity: 1.0
      has_acceleration_limits: true
      max_acceleration: 0.5
  angular:
    z:
      has_velocity_limits: true
      max_velocity: 2.0
      has_acceleration_limits: true
      max_acceleration: 1.0

# 3. 抽屉控制器 - 使用Effort控制
drawer1_controller:
  type: effort_controllers/JointPositionController
  joint: drawer2base_link
  pid: 
    p: 50.0
    i: 1.0
    d: 5.0
    i_clamp: 10.0

drawer2_controller:
  type: effort_controllers/JointPositionController
  joint: drawer22base_link
  pid: 
    p: 50.0
    i: 1.0
    d: 5.0
    i_clamp: 10.0

drawer3_controller:
  type: effort_controllers/JointPositionController
  joint: drawer32base_link
  pid: 
    p: 50.0
    i: 1.0
    d: 5.0
    i_clamp: 10.0